<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel RPG - 螢幕自適應最終版</title>
    <style>
        :root {
            --primary-color: #2f3542;
            --danger-color: #ff4757;
            --bg-white: #ffffff;
        }

        body { 
            background: var(--bg-white); 
            color: var(--primary-color); 
            font-family: 'Segoe UI', "微軟正黑體", sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow-x: hidden; /* 禁止左右捲軸，防止破圖 */
        }

        #game-container { 
            width: 98vw; 
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 10px;
            box-sizing: border-box;
        }

        /* 頂部狀態列：縮小高度以騰出空間給圖片 */
        .header-bar { 
            display: flex; 
            justify-content: space-around; 
            background: #f8f9fa;
            padding: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
        }

        /* 核心修正：強制並排且高度自適應 */
        .battle-arena { 
            flex: 1; /* 自動填滿剩餘空間 */
            display: flex; 
            flex-direction: row; 
            flex-wrap: nowrap; /* 強制不換行 */
            justify-content: center; 
            align-items: flex-end; 
            gap: 2vw; 
            margin: 10px 0;
            max-height: 60vh; /* 限制圖片區域最高佔螢幕 60% */
        }

        /* 每一張角色圖片佔螢幕寬度的 45% */
        .entity-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 45vw; 
            max-width: 600px; /* 防止在大螢幕過度放大 */
            position: relative;
        }

        .entity { width: 100%; }
        .entity img { 
            width: 100%; 
            height: auto; 
            max-height: 50vh; /* 確保圖片高度不超過螢幕一半 */
            object-fit: contain; 
            image-rendering: pixelated; 
        }

        /* 勇者水平翻轉 */
        #player-sprite img { transform: scaleX(-1); }

        /* 血條與文字資訊 */
        .hp-bar-container { 
            width: 100%; 
            height: 15px; 
            background: #eee; 
            border-radius: 10px; 
            overflow: hidden;
            margin-top: 5px;
        }
        .hp-bar-fill { height: 100%; background: var(--danger-color); width: 100%; transition: width 0.3s; }
        .info-text { font-size: 1.1rem; font-weight: bold; margin-top: 5px; }

        /* 遊戲日誌區 */
        #log-window { 
            height: 80px; 
            background: #f1f2f6; 
            padding: 10px;
            font-size: 1rem;
            overflow-y: auto;
            border-radius: 5px;
            text-align: left;
            margin: 5px 0;
        }

        /* 控制按鈕 */
        .btn-group { padding-bottom: 10px; }
        button { 
            padding: 10px 30px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            cursor: pointer;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
        }
        button:disabled { opacity: 0.5; }

        /* 傷害飄字動畫 */
        .dmg-popup {
            position: absolute;
            top: 20%;
            font-size: 2rem;
            color: red;
            font-weight: bold;
            animation: float 0.8s forwards;
        }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header-bar">
        <div>LV: <span id="lv">1</span></div>
        <div id="stage-info">📍 平原森林</div>
        <div>EXP: <span id="exp">0</span>/100</div>
    </div>

    <div class="battle-arena">
        <!-- 勇者方 -->
        
            <div id="player-dmg-pos"></div>
            <img src="pixel_adventurer.png"></div>
            <div class="info-text">勇者 (<span id="hp">100</span>/100)</div>
            <div class="hp-bar-container"><div id="hp-bar" class="hp-bar-fill"></div></div>
        </div>
        
        <!-- 怪物方 -->
        
            <div id="enemy-dmg-pos"></div>
            <img src="pixel_slime.png" id="enemy-img"></div>
            <div class="info-text"><span id="enemy-name">史萊姆</span> (HP: <span id="e-hp">40</span>)</div>
            <div class="hp-container hp-bar-container"><div id="e-hp-bar" class="hp-bar-fill"></div></div>
        </div>
    </div>

    <div id="log-window"></div>

    <div class="btn-group">
        <button id="atk-btn" onclick="handleTurn('attack')">🗡️ 普通攻擊</button>
        <button id="skill-btn" class="hidden" onclick="handleTurn('skill')">🔥 火球術</button>
    </div>
</div>

<script>
    let player = { lv: 1, hp: 100, maxHp: 100, atk: 15, exp: 0, isTurn: true };
    let enemy = { name: "史萊姆", hp: 40, maxHp: 40, atk: 10 };
    let battleCount = 1;

    async function handleTurn(type) {
        if (!player.isTurn) return;
        player.isTurn = false;
        toggleBtns(false);

        // 玩家攻擊
        let dmg = (type === 'attack') ? player.atk + r(5) : player.atk * 2.5;
        if(type==='skill') player.hp -= 5;
        enemy.hp -= Math.floor(dmg);
        showDmg('enemy-dmg-pos', Math.floor(dmg));
        animate('player-sprite', 50);
        log(`你對 ${enemy.name} 造成 ${Math.floor(dmg)} 點傷害。`);
        updateUI();

        await sleep(800);
        if (enemy.hp <= 0) { await win(); } 
        else {
            // 敵人反擊
            animate('enemy-sprite', -50);
            let edmg = enemy.atk + r(3);
            player.hp -= edmg;
            showDmg('player-dmg-pos', edmg);
            log(`${enemy.name} 反擊，造成 ${edmg} 點傷害。`);
            updateUI();
            if (player.hp <= 0) { alert("冒險結束！"); location.reload(); }
        }
        player.isTurn = true;
        toggleBtns(true);
    }

    async function win() {
        log(`擊敗了 ${enemy.name}！`);
        player.exp += 50;
        if(player.exp >= 100) { player.lv++; player.exp=0; player.maxHp+=20; player.hp=player.maxHp; player.atk+=10; log("升級了！"); }
        battleCount++;
        await sleep(1000);
        spawn();
    }

    function spawn() {
        if(battleCount % 5 === 0) {
            enemy = { name: "BOSS 史萊姆王", hp: 200, maxHp: 200, atk: 25 };
            document.getElementById('enemy-img').style.filter = "hue-rotate(90deg) contrast(1.5)";
        } else {
            enemy = { name: "史萊姆", hp: 40 + (player.lv*10), maxHp: 40 + (player.lv*10), atk: 8 + (player.lv*2) };
            document.getElementById('enemy-img').style.filter = "none";
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('lv').innerText = player.lv;
        document.getElementById('hp').innerText = Math.max(0, player.hp);
        document.getElementById('hp-bar').style.width = (player.hp/player.maxHp*100) + "%";
        document.getElementById('e-hp').innerText = Math.max(0, enemy.hp);
        document.getElementById('e-hp-bar').style.width = (enemy.hp/enemy.maxHp*100) + "%";
        document.getElementById('enemy-name').innerText = enemy.name;
        if(player.lv >= 2) document.getElementById('skill-btn').classList.remove('hidden');
    }

    function log(m) { const l = document.getElementById('log-window'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }
    function r(n) { return Math.floor(Math.random() * n); }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function toggleBtns(b) { document.getElementById('atk-btn').disabled = !b; document.getElementById('skill-btn').disabled = !b; }
    function animate(id, x) { 
        const e = document.getElementById(id); 
        e.style.transform = `translateX(${x}px)`; 
        setTimeout(()=>e.style.transform='none', 200); 
    }
    function showDmg(id, val) {
        const c = document.getElementById(id);
        const p = document.createElement('div');
        p.className = 'dmg-popup'; p.innerText = `-${val}`;
        c.appendChild(p); setTimeout(()=>p.remove(), 800);
    }
    updateUI();
</script>
</body>
</html>
