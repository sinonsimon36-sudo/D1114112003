<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Pixel RPG - 勇者優化與雙敵版</title>
    <style>
        :root { --gold: #f1c40f; --danger: #ff4757; }
        body { background: #fff; color: #333; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 95vw; max-width: 1400px; display: flex; flex-direction: column; align-items: center; }

        /* 頂部 UI */
        .stats-top { width: 100%; display: flex; justify-content: space-around; font-size: 1.5rem; font-weight: bold; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; }

        /* 戰鬥舞台：優化對齊 */
        .arena { display: flex; justify-content: center; align-items: flex-end; gap: 3vw; width: 100%; height: 450px; }
        
        .character-box { 
            width: 30%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: relative; 
            transition: opacity 0.5s;
        }

        /* 勇者與怪物圖片強制約束 */
        .sprite { 
            width: 100%; 
            height: 350px; 
            display: flex; 
            align-items: flex-end; 
            justify-content: center; 
        }
        
        .sprite img { 
            max-width: 100%; 
            max-height: 100%; 
            image-rendering: pixelated; 
            object-fit: contain; 
        }

        /* 重要：修正勇者翻轉與縮放 */
        #player-sprite img { 
            transform: scaleX(-1); /* 水平翻轉面向怪物 */
        }

        /* 血條與文字 */
        .hp-outer { width: 100%; height: 25px; background: #eee; border: 2px solid #ccc; border-radius: 15px; overflow: hidden; margin-top: 10px; }
        .hp-inner { height: 100%; background: var(--danger); width: 100%; transition: width 0.3s; }
        .label { font-size: 1.4rem; font-weight: bold; margin-top: 5px; }

        /* 技能按鈕與日誌 */
        #log { width: 80%; height: 100px; background: #f1f2f6; padding: 15px; margin-top: 20px; overflow-y: auto; font-size: 1.2rem; text-align: left; }
        .btns { margin: 20px 0; display: flex; gap: 15px; }
        button { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer; background: #2f3542; color: white; border: none; border-radius: 10px; }
        button:disabled { opacity: 0.3; }

        .hidden { display: none !important; }
        .dmg { position: absolute; top: 0; font-size: 3rem; font-weight: bold; color: red; animation: f 0.8s forwards; pointer-events: none; }
        @keyframes f { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-top">
        <div>LV: <span id="lv">1</span></div>
        <div id="story">💬 正在探索平原森林...</div>
        <div>EXP: <span id="exp">0</span>/100</div>
    </div>

    <div class="arena">
        <!-- 勇者 -->
        <div class="character-box">
            <div id="p-msg"></div>
            <div class="sprite" id="player-sprite"><img src="pixel_adventurer.png"></div>
            <div class="label">勇者 (<span id="hp">100</span>/100)</div>
            <div class="hp-outer"><div id="hp-bar" class="hp-inner"></div></div>
        </div>

        <!-- 敵人 1 -->
        <div class="character-box" id="e1-box">
            <div id="e1-msg"></div>
            <div class="sprite"><img src="pixel_slime.png" id="e1-img"></div>
            <div class="label"><span id="e1-name">史萊姆A</span> (HP: <span id="e1-hp">50</span>)</div>
            <div class="hp-outer"><div id="e1-hp-bar" class="hp-inner"></div></div>
        </div>

        <!-- 敵人 2 (後期自動開啟) -->
        <div class="character-box hidden" id="e2-box">
            <div id="e2-msg"></div>
            <div class="sprite"><img src="pixel_slime.png" id="e2-img"></div>
            <div class="label"><span id="e2-name">史萊姆B</span> (HP: <span id="e2-hp">50</span>)</div>
            <div class="hp-outer"><div id="e2-hp-bar" class="hp-inner"></div></div>
        </div>
    </div>

    <div id="log">> 戰鬥準備開始！</div>
    <div class="btns" id="btn-group">
        <button onclick="handleBattle('atk')">⚔️ 普通攻擊</button>
        <button id="skill-fire" class="hidden" onclick="handleBattle('fire')">🔥 火球術</button>
    </div>
</div>

<script>
    let player = { lv: 1, hp: 100, mhp: 100, atk: 20, exp: 0, busy: false };
    let enemyList = [
        { id: 1, name: "史萊姆A", hp: 50, mhp: 50, atk: 10, active: true },
        { id: 2, name: "史萊姆B", hp: 0, mhp: 50, atk: 10, active: false }
    ];

    async function handleBattle(type) {
        if (player.busy) return;
        player.busy = true;
        document.querySelectorAll('button').forEach(b => b.disabled = true);

        // 玩家攻擊邏輯
        let targets = enemyList.filter(e => e.active && e.hp > 0);
        if (targets.length > 0) {
            let dmg = player.atk + Math.floor(Math.random() * 10);
            if (type === 'fire') {
                targets.forEach(t => dealDmg(t, Math.floor(dmg * 1.5)));
                log(`🔥 火球術擊中所有敵人！`);
            } else {
                dealDmg(targets[0], dmg);
                log(`⚔️ 你對 ${targets[0].name} 造成了 ${dmg} 點傷害。`);
            }
            move('player-sprite', 40);
        }

        await sleep(800);
        updateUI();

        // 檢查是否全滅
        if (enemyList.filter(e => e.active && e.hp > 0).length === 0) {
            await win();
        } else {
            // 敵人回合
            for (let enemy of enemyList) {
                if (enemy.active && enemy.hp > 0) {
                    let edmg = enemy.atk + Math.floor(Math.random() * 5);
                    player.hp -= edmg;
                    popDmg('p-msg', edmg);
                    log(`${enemy.name} 發動反擊，造成 ${edmg} 點傷害。`);
                    updateUI();
                    await sleep(400);
                }
            }
            if (player.hp <= 0) { alert("戰敗！"); location.reload(); }
        }

        player.busy = false;
        document.querySelectorAll('button').forEach(b => b.disabled = false);
    }

    function dealDmg(target, amt) {
        target.hp -= amt;
        popDmg(`e${target.id}-msg`, amt);
    }

    async function win() {
        log(`🎉 勝利！獲得經驗值。`);
        player.exp += 50;
        if (player.exp >= 100) {
            player.lv++; player.exp = 0; player.mhp += 30; player.hp = player.mhp; player.atk += 10;
            log(`✨ 等級提升！目前 Lv.${player.lv}`);
        }
        await sleep(1000);
        spawn();
    }

    function spawn() {
        enemyList[0].hp = enemyList[0].mHp = 40 + (player.lv * 15);
        if (player.lv >= 3) {
            enemyList[1].active = true;
            enemyList[1].hp = enemyList[1].mHp = 30 + (player.lv * 10);
            document.getElementById('e2-box').classList.remove('hidden');
            document.getElementById('story').innerText = "📍 區域：深處森林 (遭遇雙敵)";
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('lv').innerText = player.lv;
        document.getElementById('hp').innerText = Math.max(0, player.hp);
        document.getElementById('hp-bar').style.width = (player.hp / player.mhp * 100) + "%";
        document.getElementById('exp').innerText = player.exp;
        
        enemyList.forEach(e => {
            const hpText = document.getElementById(`e${e.id}-hp`);
            if(hpText) hpText.innerText = Math.max(0, e.hp);
            const bar = document.getElementById(`e${e.id}-hp-bar`);
            if(bar) bar.style.width = (e.hp / e.mhp * 100) + "%";
            const box = document.getElementById(`e${e.id}-box`);
            if(box) box.style.opacity = (e.active && e.hp > 0) ? "1" : "0.3";
        });
        if (player.lv >= 2) document.getElementById('skill-fire').classList.remove('hidden');
    }

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function move(id, x) {
        const el = document.getElementById(id); el.style.transform = `translateX(${x}px)`;
        setTimeout(() => el.style.transform = 'none', 200);
    }
    function popDmg(id, val) {
        const c = document.getElementById(id); const d = document.createElement('div');
        d.className = 'dmg'; d.innerText = `-${val}`; c.appendChild(d);
        setTimeout(() => d.remove(), 800);
    }
    updateUI();
</script>
</body>
</html>
