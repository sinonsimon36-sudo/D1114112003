<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Pixel RPG - 技能與增益進階版</title>
    <style>
        body { background: #fff; color: #333; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 95vw; max-width: 1400px; height: 95vh; display: flex; flex-direction: column; align-items: center; position: relative; }
        .hidden { display: none !important; }

        /* 大廳介面 */
        #lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        #lobby img { width: 450px; image-rendering: pixelated; margin-bottom: 20px; }
        
        /* 戰鬥舞台 */
        #battle-screen { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .stats-top { width: 100%; display: flex; justify-content: space-around; font-size: 1.5rem; font-weight: bold; background: #f8f9fa; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .arena { display: flex; flex-direction: row; justify-content: center; align-items: flex-end; gap: 100px; width: 100%; height: 450px; margin-top: 30px; }
        .character-box { width: 450px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .sprite { width: 100%; height: 320px; display: flex; align-items: flex-end; justify-content: center; }
        .sprite img { max-width: 100%; max-height: 100%; image-rendering: pixelated; object-fit: contain; }
        #player-sprite img { transform: scaleX(-1); }

        /* 狀態效果 (Buff) 圖示 */
        .buff-container { display: flex; gap: 5px; height: 30px; margin-top: 5px; }
        .buff-icon { padding: 2px 8px; border-radius: 5px; font-size: 0.9rem; color: white; font-weight: bold; }
        .buff-atk { background: #e67e22; } /* 力量增益 */
        .buff-def { background: #3498db; } /* 護盾增益 */

        /* 血條 */
        .hp-outer { width: 100%; height: 25px; background: #eee; border: 2px solid #ccc; border-radius: 15px; overflow: hidden; margin-top: 10px; }
        .hp-inner { height: 100%; background: #ff4757; width: 100%; transition: width 0.3s ease; }
        .label { font-size: 1.4rem; font-weight: bold; margin-top: 8px; }

        /* 日誌與技能按鈕 */
        #log { width: 850px; height: 120px; background: #f1f2f6; border-radius: 10px; padding: 15px; margin-top: 20px; overflow-y: auto; font-size: 1.1rem; text-align: left; }
        .btns { margin-top: 20px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 25px; font-size: 1.2rem; font-weight: bold; cursor: pointer; background: #2f3542; color: white; border: none; border-radius: 8px; transition: 0.2s; }
        button:hover:not(:disabled) { background: #57606f; transform: translateY(-2px); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-magic { background: #5f27cd; }
        .btn-buff { background: #2ed573; }

        /* 浮動文字 */
        .floating-text { position: absolute; top: 0; font-size: 3rem; font-weight: bold; animation: floatUp 0.8s forwards; pointer-events: none; z-index: 10; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="lobby">
        <img src="pixel_art_rpg_logo.png" alt="Logo">
        <div style="font-size: 2rem; font-weight: bold; margin-bottom: 10px;">勇者傳說：機率之巔</div>
        <div style="color: #666; margin-bottom: 20px;">掌握技能與增益的時機，挑戰不斷進化的史萊姆！</div>
        <button onclick="startGame()">進入冒險</button>
    </div>

    <div id="battle-screen" class="hidden">
        <div class="stats-top">
            <div>🛡️ 等級: <span id="lv">1</span></div>
            <div id="story-line">💬 踏入神秘森林...</div>
            <div>⭐ 經驗: <span id="exp">0</span>/100</div>
        </div>

        <div class="arena">
            <div class="character-box">
                <div id="p-msg"></div>
                <div class="sprite" id="player-sprite"><img src="pixel_adventurer.png"></div>
                <div class="buff-container" id="p-buffs"></div>
                <div class="label">勇者 (<span id="hp">100</span> / <span id="max-hp">100</span>)</div>
                <div class="hp-outer"><div id="hp-bar" class="hp-inner"></div></div>
            </div>
            <div class="character-box">
                <div id="e-msg"></div>
                <div class="sprite" id="enemy-sprite"><img src="pixel_slime.png" id="e-img"></div>
                <div class="buff-container" id="e-buffs"></div>
                <div class="label"><span id="e-name">史萊姆</span> (HP: <span id="e-hp">40</span>)</div>
                <div class="hp-outer"><div id="e-hp-bar" class="hp-inner"></div></div>
            </div>
        </div>

        <div id="log">> 冒險開始！</div>
        <div class="btns">
            <button id="btn-atk" onclick="battle('attack')">🗡️ 普通攻擊</button>
            <button id="btn-skill1" class="btn-magic hidden" onclick="battle('double')">⚔️ 連續斬擊 (Lv2)</button>
            <button id="btn-skill2" class="btn-buff hidden" onclick="battle('buff')">🛡️ 聖光守護 (Lv3)</button>
            <button id="btn-skill3" class="btn-magic hidden" onclick="battle('fire')">🔥 極大火球 (Lv5)</button>
        </div>
    </div>
</div>

<script>
    let p = { lv: 1, hp: 100, mHp: 100, atk: 20, exp: 0, busy: false, buffs: { shield: 0, power: 0 } };
    let e = { name: "綠史萊姆", hp: 50, mHp: 50, atk: 12, type: 'normal' };
    let winCount = 0;

    function startGame() {
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        update();
    }

    async function battle(type) {
        if (p.busy) return; p.busy = true;
        setBtns(false);

        // --- 玩家回合 ---
        if (type === 'buff') {
            p.buffs.shield = 3; // 獲得 3 回合減傷
            log("✨ 你施放了聖光守護，防禦力大幅提升！");
            popText('p-msg', 'SHIELD', '#3498db');
        } else {
            let hitCount = (type === 'double' && r(100) < 70) ? 2 : 1; // 70% 機率連擊
            for(let i=0; i<hitCount; i++) {
                let isCrit = r(100) < 20; // 20% 暴擊
                let dmg = p.atk * (type === 'fire' ? 3 : 1) * (isCrit ? 2 : 1);
                dmg = Math.floor(dmg + r(10));
                e.hp -= dmg;
                showEffect('enemy-sprite', 'shake');
                popText('e-msg', (isCrit ? 'CRIT ' : '') + dmg, isCrit ? '#f1c40f' : '#ff4757');
                log(`🗡️ 你對敵人造成 ${dmg} 點傷害${isCrit?'(暴擊!)':''}`);
                update();
                await sleep(300);
            }
        }

        await sleep(600);
        if (e.hp <= 0) { await handleWin(); } 
        else {
            // --- 敵人回合 ---
            let isMiss = r(100) < 15; // 15% 玩家閃避
            if (isMiss) {
                log(`💨 你靈巧地閃避了 ${e.name} 的攻擊！`);
                popText('p-msg', 'MISS', '#7f8c8d');
            } else {
                let eDmg = Math.floor(e.atk + r(5));
                if (p.buffs.shield > 0) { eDmg = Math.floor(eDmg * 0.5); p.buffs.shield--; }
                p.hp -= eDmg;
                showEffect('player-sprite', 'shake');
                popText('p-msg', eDmg, '#ff4757');
                log(`${e.name} 反擊，造成 ${eDmg} 點傷害。`);
            }
            update();
            if (p.hp <= 0) { alert("戰敗！勇者回村修行了。"); location.reload(); }
        }
        p.busy = false; setBtns(true);
    }

    async function handleWin() {
        log(`🎉 擊敗了 ${e.name}！獲得大量經驗。`);
        p.exp += 50;
        if(p.exp >= 100) { 
            p.lv++; p.exp = 0; p.mHp += 40; p.hp = p.mHp; p.atk += 12; 
            log(`✨ 等級提升至 Lv.${p.lv}！習得新能力。`);
        }
        winCount++;
        update();
        await sleep(1000);
        spawn();
    }

    function spawn() {
        const types = [
            { name: "紅史萊姆", color: "hue-rotate(0deg) saturate(2)", atkMult: 1.5, hpMult: 1 },
            { name: "鋼鐵史萊姆", color: "grayscale(1) brightness(1.2)", atkMult: 0.8, hpMult: 2.5 },
            { name: "金史萊姆", color: "sepia(1) saturate(5) brightness(1.1)", atkMult: 1.2, hpMult: 0.5 }
        ];
        let t = types[r(types.length)];
        
        if((winCount+1) % 5 === 0) {
            e = { name: "魔王史萊姆", hp: 400 + (p.lv*50), mHp: 400 + (p.lv*50), atk: 30 + (p.lv*5) };
            document.getElementById('e-img').style.filter = "hue-rotate(280deg) contrast(1.5) scale(1.3)";
        } else {
            e = { 
                name: t.name, 
                hp: Math.floor((50 + p.lv*15) * t.hpMult), 
                mHp: Math.floor((50 + p.lv*15) * t.hpMult), 
                atk: Math.floor((12 + p.lv*3) * t.atkMult) 
            };
            document.getElementById('e-img').style.filter = t.color;
        }
        log(`新的 ${e.name} 跳了出來！`);
        update();
    }

    function update() {
        document.getElementById('lv').innerText = p.lv;
        document.getElementById('hp').innerText = Math.max(0, p.hp);
        document.getElementById('max-hp').innerText = p.mHp;
        document.getElementById('hp-bar').style.width = (p.hp/p.mHp*100) + "%";
        document.getElementById('exp').innerText = p.exp;
        document.getElementById('e-hp').innerText = Math.max(0, e.hp);
        document.getElementById('e-hp-bar').style.width = (e.hp/e.mHp*100) + "%";
        document.getElementById('e-name').innerText = e.name;
        
        // 更新 Buff 顯示
        const buffDiv = document.getElementById('p-buffs');
        buffDiv.innerHTML = p.buffs.shield > 0 ? `<span class="buff-icon buff-def">🛡️ 護盾 ${p.buffs.shield}</span>` : '';

        // 解鎖技能
        if(p.lv >= 2) document.getElementById('btn-skill1').classList.remove('hidden');
        if(p.lv >= 3) document.getElementById('btn-skill2').classList.remove('hidden');
        if(p.lv >= 5) document.getElementById('btn-skill3').classList.remove('hidden');
    }

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }
    function r(n) { return Math.floor(Math.random() * n); }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function setBtns(s) { 
        document.querySelectorAll('button').forEach(b => { if(b.id !== 'lobby') b.disabled = !s; }); 
    }
    function showEffect(id, type) {
        const el = document.getElementById(id);
        el.style.animation = 'none';
        el.offsetHeight; /* trigger reflow */
        if(type === 'shake') {
            el.style.transform = 'translateX(10px)';
            setTimeout(() => el.style.transform = 'translateX(-10px)', 50);
            setTimeout(() => el.style.transform = 'none', 100);
        }
    }
    function popText(id, txt, color) {
        const c = document.getElementById(id); const t = document.createElement('div');
        t.className = 'floating-text'; t.innerText = txt; t.style.color = color;
        c.appendChild(t); setTimeout(() => t.remove(), 800);
    }
</script>
</body>
</html>
