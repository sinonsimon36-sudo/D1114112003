<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勇者傳說</title>
    <style>
        :root { --gold: #f1c40f; --danger: #ff4757; --primary: #2f3542; --success: #2ecc71; --info: #3498db; }

        /* 全螢幕背景與置中 */
        body { 
            background-image: url('pure_pixel_forest_background.png');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-attachment: fixed; image-rendering: pixelated; 
            color: var(--primary); font-family: 'Segoe UI', "微軟正黑體", sans-serif; 
            margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; 
        }

        #game-container { 
            width: 94vw; max-width: 1400px; height: 92vh; 
            background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(8px);
            border: 4px solid var(--primary); border-radius: 25px;
            display: flex; flex-direction: column; align-items: center; 
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); padding: 15px; box-sizing: border-box;
        }

        .hidden { display: none !important; }

        /* 彈窗系統 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.96); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-radius: 20px; }
        .card-wrap { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .card { width: 220px; padding: 20px; border: 3px solid var(--primary); border-radius: 15px; cursor: pointer; background: #fff; transition: 0.3s; }
        .card:hover { transform: translateY(-8px); border-color: var(--info); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* UI 元件 */
        .stats-bar { width: 100%; display: flex; justify-content: space-around; background: rgba(0,0,0,0.05); padding: 10px; font-size: 1.1rem; font-weight: bold; border-radius: 10px; }
        .arena { flex: 1; display: flex; justify-content: center; align-items: flex-end; gap: 30px; width: 100%; position: relative; }
        .char-box { width: 300px; display: flex; flex-direction: column; align-items: center; position: relative; transition: opacity 0.4s; }
        .sprite { width: 100%; height: 320px; display: flex; align-items: flex-end; justify-content: center; pointer-events: none; transition: transform 0.1s; }
        .sprite img { max-width: 100%; max-height: 100%; image-rendering: pixelated; object-fit: contain; }
        #p-sprite img { transform: scaleX(-1); }

        .hp-outer { width: 100%; height: 18px; background: #ddd; border-radius: 10px; overflow: hidden; margin-top: 5px; border: 2px solid #555; }
        .hp-inner { height: 100%; background: var(--danger); width: 100%; transition: width 0.3s; }
        .type-tag { padding: 3px 12px; border-radius: 12px; color: #fff; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }

        /* 裝備與道具 */
        .equip-grid { display: flex; gap: 6px; margin-top: 8px; }
        .slot { width: 45px; height: 45px; border: 2px solid #aaa; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border-radius: 8px; }
        
        .item-bar { display: flex; gap: 12px; margin: 10px 0; height: 65px; justify-content: center; }
        .item-slot { width: 60px; height: 60px; border: 3px solid #666; background: #fff; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; font-size: 1.8rem; }
        .item-slot .count { position: absolute; bottom: -5px; right: -5px; background: #e74c3c; color: #fff; font-size: 0.8rem; padding: 2px 7px; border-radius: 10px; font-weight: bold; }

        #log { width: 85%; height: 75px; background: rgba(0,0,0,0.03); padding: 10px; overflow-y: auto; text-align: left; border-radius: 8px; font-size: 0.95rem; border: 1px solid #ccc; }
        .btns { margin: 10px 0; display: flex; gap: 12px; z-index: 3000; position: relative; }
        button { padding: 12px 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border: none; border-radius: 10px; background: var(--primary); color: #fff; box-shadow: 0 4px 0 #000; transition: 0.1s; }
        button:active { transform: translateY(2px); box-shadow: 0 0 0; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 傷害飄字 */
        .dmg { position: absolute; top: -20px; font-weight: 900; pointer-events: none; z-index: 100; animation: floatUp 0.8s ease-out forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 50% { transform: translateY(-60px) scale(1.2); } 100% { opacity: 0; transform: translateY(-110px) scale(1); } }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 1. 大廳介面 -->
    <div id="lobby" class="overlay">
        <img src="pixel_art_rpg_logo.png" style="width:400px; margin-bottom:20px;">
        <h1 style="font-size: 3rem; margin:0;">勇者傳說：終極整合</h1>
        <p style="font-size: 1.2rem; color: #555; max-width: 600px;">像素森林正面臨史萊姆的侵蝕，唯有你能終結這一切。</p>
        <button onclick="startGame()">踏上征途</button>
    </div>

    <!-- 2. Roguelike 升級選單 -->
    <div id="lv-modal" class="overlay hidden">
        <h1 style="color:var(--gold); font-size: 2.5rem;">✨ 覺醒時刻：選擇強化 ✨</h1>
        <div id="lv-options" class="card-wrap"></div>
    </div>

    <!-- 3. 商城選單 -->
    <div id="shop-modal" class="overlay hidden">
        <h1>🛒 森林補給站</h1>
        <p>持金：<span id="shop-gold" style="color:var(--gold)">0</span> G</p>
        <div id="shop-items" class="card-wrap"></div>
        <button style="margin-top:20px; background:#777" onclick="toggleShop(false)">離開商城</button>
    </div>

    <!-- 4. 戰鬥畫面 -->
    <div id="battle-ui" class="hidden" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center;">
        <div class="stats-bar">
            <div>🛡️ LV: <span id="lv">1</span></div>
            <div id="story-text">💬 正在穿過迷霧森林...</div>
            <div style="color:var(--gold)">💰 <span id="gold">0</span> G</div>
            <div>⭐ BOSS 進度: <span id="kill-count">0</span>/5</div>
        </div>

        <div class="arena">
            <!-- 勇者 -->
            <div class="char-box">
                <div id="p-msg"></div>
                <div class="sprite" id="p-sprite"><img src="pixel_adventurer.png"></div>
                <div class="equip-grid">
                    <div class="slot" id="sl-w" title="武器"></div>
                    <div class="slot" id="sl-a" title="防具"></div>
                    <div class="slot" id="sl-b" title="飾品"></div>
                </div>
                <div style="font-weight:bold; margin-top:5px; font-size: 1.1rem;">勇者 (<span id="hp">100</span>/<span id="mhp">100</span>)</div>
                <div class="hp-outer"><div id="hp-bar" class="hp-inner"></div></div>
            </div>
            <!-- 敵人 A -->
            <div class="char-box" id="e1-box">
                <div id="e1-msg"></div>
                <div class="sprite" id="e1-sprite"><img src="pixel_slime.png" id="e1-img"></div>
                <div id="e1-tag" class="type-tag"></div>
                <div style="font-weight:bold; font-size: 1.1rem;"><span id="e1-name">史萊姆</span></div>
                <div class="hp-outer"><div id="e1-hp-bar" class="hp-inner"></div></div>
            </div>
            <!-- 敵人 B (後期) -->
            <div class="char-box hidden" id="e2-box">
                <div id="e2-msg"></div>
                <div class="sprite" id="e2-sprite"><img src="pixel_slime.png" id="e2-img"></div>
                <div id="e2-tag" class="type-tag"></div>
                <div style="font-weight:bold; font-size: 1.1rem;"><span id="e2-name">史萊姆B</span></div>
                <div class="hp-outer"><div id="e2-hp-bar" class="hp-inner"></div></div>
            </div>
        </div>

        <!-- 道具欄 -->
        <div class="item-bar" id="p-items"></div>

        <div id="log">> 勇者踏入戰場...</div>
        <div class="btns" id="btn-group">
            <button id="atk-btn" onclick="handleBattle('atk')">🗡️ 普通攻擊</button>
            <button style="background:#e67e22" onclick="toggleShop(true)">🛒 前往商城</button>
        </div>
    </div>
</div>

<script>
    // --- 遊戲全局狀態 ---
    let g = {
        p: { lv:1, hp:100, mhp:100, atk:25, gold:50, exp:0, busy:false, skills:[], equips:[], inv:{pot:1}, crit:0.1, life:0, dodge:0 },
        enemies: [],
        killCount: 0,
        bossKills: 0
    };

    const slimeLib = [
        { n: "綠史萊姆", t: "normal", c: "none", h: 1, a: 1, g: 1, bg: "#2ed573" },
        { n: "火史萊姆", t: "fire", c: "hue-rotate(0deg) saturate(2.5)", h: 1.2, a: 1.6, g: 1.5, bg: "#e74c3c" },
        { n: "雷史萊姆", t: "elec", c: "hue-rotate(60deg) brightness(1.3)", h: 0.9, a: 2.2, g: 2.5, bg: "#f1c40f" },
        { n: "金史萊姆", t: "gold", c: "sepia(1) saturate(10)", h: 5.0, a: 0.5, g: 25, bg: "#d4af37" },
        { n: "暗影史萊姆", t: "dark", c: "brightness(0.3)", h: 1.5, a: 1.8, g: 2, bg: "#333" }
    ];

    const talentPool = [
        { id:'fire', n:'🔥 火球術', d:'群體 2.5 倍魔傷' },
        { id:'crit', n:'🎯 鷹眼', d:'暴擊率 +20%' },
        { id:'life', n:'🧛 嗜血', d:'攻擊附帶吸血效果' },
        { id:'hp', n:'❤️ 生命強化', d:'最大 HP +80' },
        { id:'double', n:'⚔️ 二連斬', d:'機率連續攻擊兩次' }
    ];

    const shopItems = [
        { id:'swd', n:'⚔️ 屠龍寶刀', p:150, d:'ATK+25', s:'w', i:'⚔️' },
        { id:'arm', n:'🛡️ 龍鱗重甲', p:200, d:'MHP+150', s:'a', i:'🛡️' },
        { id:'bts', n:'🥾 疾行之靴', p:100, d:'閃避率+15%', s:'b', i:'🥾' },
        { id:'pot', n:'🧪 回復藥水', p:30, d:'回復 50% HP', consume:true }
    ];

    function startGame() { 
        document.getElementById('lobby').classList.add('hidden'); 
        document.getElementById('battle-ui').classList.remove('hidden'); 
        spawn(); updateUI();
    }

    // --- 核心戰鬥邏輯 (防死機強化版) ---
    async function handleBattle(type) {
        if (g.p.busy) return;
        g.p.busy = true; setBtns(false);

        try {
            let targets = g.enemies.filter(e => e.hp > 0);
            let baseDmg = g.p.atk + (g.p.equips.includes('swd')?25:0);
            
            // 玩家攻擊回合 (處理連擊)
            let hitTimes = (g.p.skills.includes('double') && Math.random() < 0.25) ? 2 : 1;
            for(let i=0; i<hitTimes; i++) {
                let t = targets[0]; // 優先打第一隻
                if(!t) break;
                
                let isCrit = Math.random() < g.p.crit;
                let dmg = Math.floor((isCrit ? baseDmg * 2 : baseDmg) + Math.random()*10);
                if(type==='fire') dmg = Math.floor(dmg * 2.5);

                t.hp -= dmg;
                pop(`e${t.id}-msg`, (isCrit?'🔥CRIT! ':'')+'-'+dmg, isCrit?'orange':'red', isCrit?'3.5rem':'2.5rem');
                move('p-sprite', 50); shake(`e${t.id}-sprite`);
                log(`🗡️ 你對 ${t.name} 造成 ${dmg} 傷害。`);
                
                if(g.p.life > 0) {
                    let heal = Math.floor(dmg * 0.15);
                    g.p.hp = Math.min(g.p.mhp, g.p.hp + heal);
                    pop('p-msg', '+'+heal, 'green', '1.5rem');
                }
                updateUI(); await sleep(350);
                if (g.enemies.every(e => e.hp <= 0)) break;
            }

            await sleep(600);

            if (g.enemies.every(e => e.hp <= 0)) {
                await handleWin();
            } else {
                // 敵人反擊回合
                for (let e of g.enemies) {
                    if (e.hp > 0) {
                        if(Math.random() < g.p.dodge) {
                            pop('p-msg', 'MISS!', 'gray', '2rem');
                            log(`💨 你閃開了 ${e.name} 的攻擊！`);
                        } else {
                            let edmg = Math.floor(e.atk + Math.random()*5);
                            g.p.hp -= edmg; pop('p-msg', '-'+edmg, 'red', '2rem'); shake('p-sprite');
                            log(`${e.name} 反擊造成 ${edmg} 傷害。`);
                        }
                        updateUI(); await sleep(400);
                    }
                }
                if (g.p.hp <= 0) { alert("冒險終結！勇者正在村莊休養。"); location.reload(); }
            }
        } finally {
            g.p.busy = false; setBtns(true);
        }
    }

    function useItem(id) {
        if(g.p.busy || g.p.inv[id] <= 0) return;
        let heal = Math.floor(g.p.mhp * 0.5);
        g.p.hp = Math.min(g.p.mhp, g.p.hp + heal); 
        g.p.inv[id]--; 
        log(`🧪 使用藥水，體力回復 ${heal} 點。`); pop('p-msg', '+'+heal, 'green', '2.5rem');
        updateUI();
    }

    async function handleWin() {
        let isB = g.enemies.some(e => e.isBoss);
        let gold = g.enemies.reduce((s,e)=>s+e.gold, 0) + r(15);
        g.p.gold += gold; g.p.exp += 50;
        log(`🎉 勝利！獲得了 ${gold} 金幣獎勵。`);
        if (g.p.exp >= 100) await showLevelUp();
        if(!isB) g.killCount++; else g.killCount = 0;
        await sleep(800); spawn();
    }

    function spawn() {
        g.enemies = [];
        const isB = g.killCount >= 5;
        if(isB) {
            g.enemies.push({ id:1, name:"👿 史萊姆魔王", hp:600+g.p.lv*100, mhp:600+g.p.lv*100, atk:35+g.p.lv*5, gold:200, isBoss:true });
            document.getElementById('e1-img').style.filter = "hue-rotate(280deg) brightness(0.7) scale(1.4)";
            document.getElementById('e1-tag').innerText = "BOSS";
            document.getElementById('e1-tag').style.background = "purple";
            document.getElementById('e2-box').classList.add('hidden');
        } else {
            g.enemies.push(createE(1));
            const double = g.p.lv >= 5 && Math.random() < 0.4;
            if(double) { g.enemies.push(createE(2)); document.getElementById('e2-box').classList.remove('hidden'); }
            else { document.getElementById('e2-box').classList.add('hidden'); }
            document.getElementById('e1-img').style.filter = "none";
        }
        updateUI();
    }

    function createE(id) {
        let t = slimeLib[r(slimeLib.length)];
        const e = { id, name: t.n, hp: Math.floor((45+g.p.lv*12)*t.h), mhp: Math.floor((45+g.p.lv*12)*t.h), atk: Math.floor((10+g.p.lv*2)*t.a), gold: Math.floor((18+g.p.lv*5)*t.g) };
        document.getElementById(`e${id}-img`).style.filter = t.c;
        document.getElementById(`e${id}-tag`).innerText = t.n.replace("史萊姆","");
        document.getElementById(`e${id}-tag`).style.background = t.bg;
        document.getElementById(`e${id}-name`).innerText = t.n;
        return e;
    }

    function showLevelUp() {
        return new Promise(res => {
            g.p.exp = 0; g.p.lv++;
            const modal = document.getElementById('lv-modal'); modal.classList.remove('hidden');
            const cont = document.getElementById('lv-options'); cont.innerHTML = '';
            talentPool.sort(()=>0.5-Math.random()).slice(0,3).forEach(s => {
                const c = document.createElement('div'); c.className = 'card';
                c.innerHTML = `<h3>${s.n}</h3><p>${s.d}</p>`;
                c.onclick = () => {
                    if(s.id==='hp') { g.p.mhp+=80; g.p.hp=g.p.mhp; }
                    else if(s.id==='crit') g.p.crit += 0.2;
                    else if(s.id==='life') g.p.life = 1;
                    else if(!g.p.skills.includes(s.id)) {
                        g.p.skills.push(s.id);
                        const b = document.createElement('button'); b.innerText = s.n; 
                        b.onclick = () => handleBattle(s.id); document.getElementById('btn-group').appendChild(b);
                    }
                    modal.classList.add('hidden'); res(); updateUI();
                };
                cont.appendChild(c);
            });
        });
    }

    function toggleShop(s) {
        document.getElementById('shop-modal').classList.toggle('hidden', !s);
        document.getElementById('shop-gold').innerText = g.p.gold;
        const cont = document.getElementById('shop-items'); cont.innerHTML = '';
        shopItems.forEach(i => {
            const c = document.createElement('div'); c.className = 'card';
            c.innerHTML = `<h3>${i.n}</h3><p>${i.d}</p><p style="color:var(--gold)">${i.p} G</p>`;
            c.onclick = () => {
                if(g.p.gold >= i.p) {
                    g.p.gold -= i.p; 
                    if(i.consume) g.p.inv.pot++;
                    else { g.p.equips.push(i.id); document.getElementById('sl-'+i.s).innerText = i.i; if(i.id==='arm') g.p.mhp+=150; if(i.id==='bts') g.p.dodge=0.15; }
                    toggleShop(true); updateUI();
                } else alert("金幣不足！");
            };
            cont.appendChild(c);
        });
    }

    function updateUI() {
        document.getElementById('lv').innerText = g.p.lv;
        document.getElementById('hp').innerText = Math.floor(Math.max(0, g.p.hp)); 
        document.getElementById('mhp').innerText = g.p.mhp;
        document.getElementById('hp-bar').style.width = (g.p.hp/g.p.mhp*100) + "%";
        document.getElementById('gold').innerText = g.p.gold;
        document.getElementById('kill-count').innerText = g.killCount % 5;
        g.enemies.forEach(e => {
            const bar = document.getElementById(`e${e.id}-hp-bar`); if(bar) bar.style.width = (Math.max(0, e.hp)/e.mhp*100) + "%";
            document.getElementById(`e${e.id}-box`).style.opacity = e.hp <= 0 ? "0.3" : "1";
        });
        const iBox = document.getElementById('p-items'); iBox.innerHTML = '';
        const count = g.p.inv.pot;
        const slot = document.createElement('div'); slot.className = `item-slot ${count===0?'empty':''}`;
        slot.innerHTML = `<span>🧪</span>${count>0?`<div class="count">x${count}</div>`:''}`;
        if(count>0) slot.onclick = () => useItem('pot');
        iBox.appendChild(slot);
    }

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }
    function r(n) { return Math.floor(Math.random()*n); }
    function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }
    function setBtns(s) { document.querySelectorAll('button').forEach(b => { if(!b.parentElement.classList.contains('card')) b.disabled = !s; }); }
    function move(id, x) { const e = document.getElementById(id); e.style.transform = `translateX(${x}px)`; setTimeout(()=>e.style.transform='none', 200); }
    function shake(id) { const e = document.getElementById(id); e.style.transform = `translateX(5px)`; setTimeout(()=>e.style.transform=`translateX(-5px)`, 50); setTimeout(()=>e.style.transform='none', 100); }
    function pop(id, t, c, fs) {
        const cl = document.getElementById(id); const d = document.createElement('div');
        d.className = 'dmg'; d.innerText = t; d.style.color = c || 'red'; if(fs) d.style.fontSize = fs;
        cl.appendChild(d); setTimeout(()=>d.remove(), 800);
    }
</script>
</body>
</html>
