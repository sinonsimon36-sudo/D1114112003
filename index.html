<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel RPG - 森林冒險版</title>
    <style>
        :root { --gold: #f1c40f; --danger: #ff4757; --primary: #2f3542; }

        /* 核心設定：背景圖片與絕對置中 */
        body { 
            background-image: url('pure_pixel_forest_background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            image-rendering: pixelated; /* 保持像素背景銳利 */
            
            color: var(--primary); 
            font-family: 'Segoe UI', "微軟正黑體", sans-serif; 
            margin: 0; 
            overflow: hidden; 
            
            /* 畫面絕對置中 */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            width: 100vw;
        }

        /* 遊戲主容器：半透明質感提升閱讀性 */
        #game-container { 
            width: 90vw; 
            max-width: 1400px; 
            height: 90vh; 
            background: rgba(255, 255, 255, 0.85); /* 半透明白色 */
            backdrop-filter: blur(5px); /* 磨砂玻璃效果 */
            border: 4px solid var(--primary);
            border-radius: 25px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            padding: 20px;
            box-sizing: border-box;
        }

        .hidden { display: none !important; }

        /* 彈窗系統 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-radius: 20px; }
        .card-wrap { display: flex; gap: 15px; margin-top: 20px; }
        .card { width: 200px; padding: 15px; border: 3px solid var(--primary); border-radius: 12px; cursor: pointer; background: #fff; transition: 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }

        /* 頂部狀態 */
        .stats-bar { width: 100%; display: flex; justify-content: space-around; background: rgba(0,0,0,0.05); padding: 12px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; margin-bottom: 10px; }

        /* 戰鬥舞台：確保圖片在同一地平線 */
        .arena { flex: 1; display: flex; justify-content: center; align-items: flex-end; gap: 5vw; width: 100%; position: relative; }
        .char-box { width: 350px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .sprite { width: 100%; height: 350px; display: flex; align-items: flex-end; justify-content: center; pointer-events: none; }
        .sprite img { max-width: 100%; max-height: 100%; image-rendering: pixelated; object-fit: contain; }
        #p-sprite img { transform: scaleX(-1); }

        /* UI 元件 */
        .hp-outer { width: 100%; height: 20px; background: #ddd; border-radius: 10px; overflow: hidden; margin-top: 10px; border: 2px solid #555; }
        .hp-inner { height: 100%; background: var(--danger); width: 100%; transition: width 0.3s; }
        
        #log { width: 80%; height: 80px; background: rgba(255,255,255,0.6); padding: 10px; margin-top: 15px; overflow-y: auto; text-align: left; border-radius: 8px; font-size: 1rem; border: 1px solid #ccc; }
        .btns { margin: 15px 0; display: flex; gap: 15px; z-index: 3000; }
        button { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border: none; border-radius: 12px; background: var(--primary); color: #fff; box-shadow: 0 5px 0 #000; }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }
        button:disabled { opacity: 0.4; }

        .dmg { position: absolute; top: 0; font-size: 3rem; font-weight: bold; color: red; animation: floatUp 0.8s forwards; pointer-events: none; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 1. 大廳 -->
    <div id="lobby" class="overlay">
        <img src="pixel_art_rpg_logo.png" style="width:400px; image-rendering: pixelated; margin-bottom:20px;">
        <h1 style="font-size: 3rem; margin:0;">森林之光</h1>
        <p style="font-size: 1.5rem; color: #444;">背景圖片已載入。勇者，在像素森林中戰鬥吧！</p>
        <button onclick="startGame()">踏上征途</button>
    </div>

    <!-- 2. 升級/商城彈窗 (邏輯保留) -->
    <div id="lv-modal" class="overlay hidden">
        <h1 style="color:var(--gold);">✨ 等級提升：選擇天賦 ✨</h1>
        <div id="lv-options" class="card-wrap"></div>
    </div>
    <div id="shop-modal" class="overlay hidden">
        <h1>🛒 森林補給站</h1>
        <p>持有金幣：<span id="shop-gold" style="color:var(--gold)">0</span> G</p>
        <div id="shop-items" class="card-wrap"></div>
        <button style="margin-top:30px; background:#777" onclick="toggleShop(false)">返回森林</button>
    </div>

    <!-- 3. 戰鬥畫面 -->
    <div id="battle-ui" class="hidden" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center;">
        <div class="stats-bar">
            <div>🛡️ 等級: <span id="lv">1</span></div>
            <div id="story-text">💬 正在探索深處森林...</div>
            <div style="color:var(--gold)">💰 <span id="gold">0</span> G</div>
            <div>⭐ 進度: <span id="kill-count">0</span>/5</div>
        </div>

        <div class="arena">
            <!-- 勇者 -->
            <div class="char-box">
                <div id="p-msg"></div>
                <div class="sprite" id="p-sprite"><img src="pixel_adventurer.png"></div>
                <div style="font-weight:bold; font-size:1.2rem; margin-top:5px;">勇者 (HP: <span id="hp">100</span>)</div>
                <div class="hp-outer"><div id="hp-bar" class="hp-inner"></div></div>
            </div>
            <!-- 怪物 -->
            <div class="char-box" id="e1-box">
                <div id="e1-msg"></div>
                <div class="sprite"><img src="pixel_slime.png" id="e1-img"></div>
                <div style="font-weight:bold; font-size:1.2rem; margin-top:5px;"><span id="e1-name">史萊姆</span></div>
                <div class="hp-outer"><div id="e1-hp-bar" class="hp-inner"></div></div>
            </div>
        </div>

        <div id="log">> 準備進入戰鬥...</div>
        <div class="btns" id="btn-group">
            <button id="main-atk" onclick="handleBattle('atk')">🗡️ 發動攻擊</button>
            <button style="background:#e67e22" onclick="toggleShop(true)">🛒 商城</button>
        </div>
    </div>
</div>

<script>
    // --- 核心邏輯整合版 ---
    let state = {
        p: { lv:1, hp:100, mhp:100, atk:25, gold:50, exp:0, busy:false, skills:[] },
        enemies: [],
        killCount: 0
    };

    function startGame() {
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('battle-ui').classList.remove('hidden');
        spawn();
    }

    async function handleBattle(type) {
        if (state.p.busy) return;
        state.p.busy = true; setBtns(false);

        try {
            let t = state.enemies;
            let dmg = state.p.atk + Math.floor(Math.random()*10);
            
            // 玩家攻擊
            t.hp -= dmg;
            pop('e1-msg', '-'+dmg);
            move('p-sprite', 50);
            log(`🗡️ 你對 ${t.name} 造成 ${dmg} 點傷害。`);
            
            updateUI();
            await sleep(600);

            if (t.hp <= 0) {
                await handleWin();
            } else {
                // 敵人反擊
                let edmg = t.atk;
                state.p.hp -= edmg;
                pop('p-msg', '-'+edmg);
                updateUI();
                await sleep(400);
                if (state.p.hp <= 0) { alert("冒險失敗！"); location.reload(); }
            }
        } finally {
            state.p.busy = false; setBtns(true);
        }
    }

    async function handleWin() {
        let gold = 30 + Math.floor(Math.random()*20);
        state.p.gold += gold; state.p.exp += 50;
        log(`🎉 擊敗敵人！獲得 ${gold} 金幣。`);
        if (state.p.exp >= 100) await showLevelUp();
        state.killCount++;
        await sleep(800);
        spawn();
    }

    function spawn() {
        state.enemies = { id:1, name:"史萊姆", hp:50+state.p.lv*10, mhp:50+state.p.lv*10, atk:12 };
        if (state.killCount % 5 === 0 && state.killCount !== 0) {
            state.enemies = { id:1, name:"魔王史萊姆", hp:400, mhp:400, atk:25 };
            document.getElementById('e1-img').style.filter = "hue-rotate(280deg) brightness(0.7)";
            log("⚠️ 魔王出現了！");
        } else {
            document.getElementById('e1-img').style.filter = "none";
        }
        updateUI();
    }

    function showLevelUp() {
        return new Promise(res => {
            state.p.exp = 0; state.p.lv++;
            const modal = document.getElementById('lv-modal');
            modal.classList.remove('hidden');
            const cont = document.getElementById('lv-options'); cont.innerHTML = '';
            
            const opts = [{id:'hp', n:'❤️ 生命強化'}, {id:'atk', n:'⚔️ 力量強化'}, {id:'gold', n:'💰 幸運加持'}];
            opts.forEach(s => {
                const c = document.createElement('div'); c.className = 'card';
                c.innerHTML = `<h3>${s.n}</h3><p>點擊升級</p>`;
                c.onclick = () => {
                    if(s.id==='hp') { state.p.mhp+=50; state.p.hp=state.p.mhp; }
                    else if(s.id==='atk') state.p.atk+=10;
                    modal.classList.add('hidden'); res();
                };
                cont.appendChild(c);
            });
        });
    }

    function toggleShop(s) {
        document.getElementById('shop-modal').classList.toggle('hidden', !s);
        document.getElementById('shop-gold').innerText = state.p.gold;
        const cont = document.getElementById('shop-items'); cont.innerHTML = '';
        const items = [{n:'🧪 回復藥水', p:20, id:'pot'}, {n:'⚔️ 鋒利長劍', p:100, id:'swd'}];
        items.forEach(i => {
            const c = document.createElement('div'); c.className = 'card';
            c.innerHTML = `<h3>${i.n}</h3><p>${i.p} G</p>`;
            c.onclick = () => {
                if(state.p.gold >= i.p) {
                    state.p.gold -= i.p;
                    if(i.id==='pot') state.p.hp = state.p.mhp;
                    else state.p.atk += 15;
                    toggleShop(true);
                } else alert("金幣不足！");
            };
            cont.appendChild(c);
        });
    }

    function updateUI() {
        document.getElementById('lv').innerText = state.p.lv;
        document.getElementById('hp').innerText = Math.floor(state.p.hp);
        document.getElementById('hp-bar').style.width = (state.p.hp/state.p.mhp*100) + "%";
        document.getElementById('gold').innerText = state.p.gold;
        document.getElementById('kill-count').innerText = state.killCount;
        let e = state.enemies;
        document.getElementById('e1-hp-bar').style.width = (e.hp/e.mhp*100) + "%";
        document.getElementById('e1-name').innerText = e.name;
    }

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function setBtns(s) { document.querySelectorAll('button').forEach(b => { if(!b.parentElement.classList.contains('card')) b.disabled = !s; }); }
    function move(id, x) { const e = document.getElementById(id); e.style.transform = `translateX(${x}px)`; setTimeout(() => e.style.transform = 'none', 200); }
    function pop(id, t) {
        const cl = document.getElementById(id); const d = document.createElement('div');
        d.className = 'dmg'; d.innerText = t; cl.appendChild(d); setTimeout(() => d.remove(), 800);
    }
</script>
</body>
</html>
