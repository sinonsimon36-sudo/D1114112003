<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Pixel RPG - 5吋展示版</title>
    <style>
        /* 背景改為白色，文字改為深色 */
        body { background: #FFFFFF; color: #333; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* 容器寬度加大以容納 5 吋圖片 */
        #game-container { width: 900px; border: 4px solid #ddd; background: #fff; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        
        .hidden { display: none !important; }
        
        /* 開始畫面 Logo */
        #start-screen img { 
            width: 480px; /* 約 5 吋寬 */
            height: auto; 
            margin-bottom: 20px; 
            image-rendering: pixelated; 
        }
        
        /* 戰鬥畫面：調整為 5 吋大小 */
        .stats-bar { display: flex; justify-content: space-between; color: #2ecc71; margin-bottom: 10px; font-weight: bold; font-size: 1.2rem; }
        .battle-arena { display: flex; justify-content: space-around; align-items: flex-end; height: 550px; background: #f9f9f9; border: 2px solid #eee; margin: 15px 0; }
        
        /* 角色容器：設定為約 5 吋寬度 (480px) */
        .entity { 
            width: 400px; 
            transition: transform 0.2s; 
        }
        
        /* 圖片填滿並翻轉勇者 */
        .entity img { 
            width: 100%; 
            height: auto; 
            image-rendering: pixelated; 
        }

        #player-sprite img {
            transform: scaleX(-1); /* 勇者水平翻轉 */
        }
        
        /* 血條與日誌：顏色調整以適應白色背景 */
        .hp-container { width: 200px; height: 15px; background: #eee; border: 1px solid #ccc; margin: 5px auto; }
        .hp-fill { height: 100%; background: #e74c3c; transition: width 0.3s; }
        #log { height: 120px; overflow-y: auto; background: #f0f0f0; padding: 10px; text-align: left; border: 1px solid #ddd; font-size: 16px; color: #444; }
        
        button { padding: 12px 25px; margin: 5px; cursor: pointer; background: #eee; color: #333; border: 2px solid #ccc; font-family: inherit; font-weight: bold; font-size: 1rem; }
        button:hover:not(:disabled) { background: #3498db; border-color: #2980b9; color: #fff; }
        button:disabled { color: #ccc; cursor: not-allowed; }
        
        .boss-warning { color: #e74c3c; font-weight: bold; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <img src="pixel_art_rpg_logo.png" alt="遊戲標題圖">
        <div style="font-size: 28px; color: #2c3e50; margin-bottom: 20px; font-weight: bold;">勇者試煉：像素之魂</div>
        <button onclick="startGame()">開始冒險</button>
    </div>

    <div id="main-game" class="hidden">
        <div class="stats-bar">
            <div>等級: <span id="lv">1</span></div>
            <div>經驗值: <span id="exp">0</span>/100</div>
            <div id="stage-info" style="color: #7f8c8d;">森林深處</div>
        </div>

        <div class="battle-arena">
            <div>
                <img src="pixel_adventurer.png"></div>
                <div style="margin-top:10px; font-weight: bold;">勇者 (HP: <span id="hp">100</span>)</div>
                <div class="hp-container"><div id="hp-bar" class="hp-fill" style="width: 100%;"></div></div>
            </div>
            <div>
                <img src="pixel_slime.png" id="enemy-img"></div>
                <div style="margin-top:10px; font-weight: bold;"><span id="enemy-name">史萊姆</span> (HP: <span id="e-hp">40</span>)</div>
                <div class="hp-container"><div id="e-hp-bar" class="hp-fill" style="width: 100%;"></div></div>
            </div>
        </div>

        <div id="log">> 戰鬥準備完成。</div>

        <div id="battle-controls" style="margin-top: 20px;">
            <button id="atk-btn" onclick="handleTurn('attack')">⚔️ 普通攻擊</button>
            <button id="skill-btn" onclick="handleTurn('skill')" class="hidden">🔥 火球術 (耗5HP)</button>
        </div>
    </div>
</div>

<script>
    /* JavaScript 邏輯保持不變，確保回合制與 BOSS 系統運作正常 */
    let player = { lv: 1, hp: 100, maxHp: 100, exp: 0, nextExp: 100, atk: 15, isTurn: true };
    let enemy = { name: "史萊姆", hp: 40, maxHp: 40, atk: 8, isBoss: false };
    let battleCount = 1;

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('main-game').classList.remove('hidden');
        updateUI();
    }

    async function handleTurn(type) {
        if (!player.isTurn) return;
        player.isTurn = false;
        toggleButtons(false);

        if (type === 'attack') {
            let dmg = player.atk + Math.floor(Math.random() * 5);
            enemy.hp -= dmg;
            animate('player-sprite', 'translateX(50px)'); 
            log(`你發動攻擊，對 ${enemy.name} 造成 ${dmg} 點傷害。`);
        } else if (type === 'skill') {
            let dmg = Math.floor(player.atk * 2.5);
            player.hp -= 5;
            enemy.hp -= dmg;
            animate('player-sprite', 'scale(1.1)'); 
            log(`🔥 火球術！對 ${enemy.name} 造成 ${dmg} 點鉅額傷害！`);
        }

        updateUI();
        await sleep(800);

        if (enemy.hp <= 0) {
            await win();
            player.isTurn = true;
            toggleButtons(true);
            return;
        }

        animate('enemy-sprite', 'translateX(-50px)'); 
        let eDmg = enemy.atk + Math.floor(Math.random() * 4);
        player.hp -= eDmg;
        log(`${enemy.name} 反擊，你受到了 ${eDmg} 點傷害。`);
        
        updateUI();
        await sleep(600);

        if (player.hp <= 0) {
            alert("你戰敗了... 冒險結束。");
            location.reload();
        }

        player.isTurn = true;
        toggleButtons(true);
    }

    async function win() {
        log(`🎉 勝利！你擊敗了 ${enemy.name}！`);
        let gainExp = enemy.isBoss ? 150 : 50;
        player.exp += gainExp;
        if (player.exp >= player.nextExp) {
            player.lv++;
            player.exp = 0;
            player.maxHp += 30;
            player.hp = player.maxHp;
            player.atk += 10;
            log(`✨ 等級提升至 Lv.${player.lv}！`);
        }
        battleCount++;
        await sleep(1000);
        spawnEnemy();
    }

    function spawnEnemy() {
        if (battleCount % 5 === 0) {
            enemy = {
                name: "🔥 魔王史萊姆 BOSS",
                hp: 200 + (player.lv * 50),
                maxHp: 200 + (player.lv * 50),
                atk: 20 + (player.lv * 5),
                isBoss: true
            };
            document.getElementById('stage-info').innerHTML = `<span class="boss-warning">⚠️ BOSS 戰 ⚠️</span>`;
            document.getElementById('enemy-img').style.filter = "hue-rotate(90deg) contrast(1.5)"; 
        } else {
            enemy = {
                name: "野外史萊姆",
                hp: 40 + (player.lv * 15),
                maxHp: 40 + (player.lv * 15),
                atk: 8 + (player.lv * 3),
                isBoss: false
            };
            document.getElementById('stage-info').innerText = "森林深處";
            document.getElementById('enemy-img').style.filter = "none";
        }
        log(`新的 ${enemy.name} 出現了！`);
        updateUI();
    }

    function updateUI() {
        document.getElementById('lv').innerText = player.lv;
        document.getElementById('hp').innerText = player.hp < 0 ? 0 : player.hp;
        document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + "%";
        document.getElementById('exp').innerText = player.exp;
        document.getElementById('e-hp').innerText = enemy.hp < 0 ? 0 : enemy.hp;
        document.getElementById('e-hp-bar').style.width = (enemy.hp / enemy.maxHp * 100) + "%";
        document.getElementById('enemy-name').innerText = enemy.name;
        if(player.lv >= 2) document.getElementById('skill-btn').classList.remove('hidden');
    }

    function log(msg) {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML += `<div>> ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function toggleButtons(enabled) {
        document.getElementById('atk-btn').disabled = !enabled;
        document.getElementById('skill-btn').disabled = !enabled;
    }

    function animate(id, trans) {
        const el = document.getElementById(id);
        el.style.transform = trans;
        setTimeout(() => el.style.transform = 'translate(0) scale(1)', 200);
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
</script>

</body>
</html>
