<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Pixel RPG - Roguelike 隨機升級版</title>
    <style>
        body { background: #fff; color: #333; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 95vw; max-width: 1400px; height: 95vh; display: flex; flex-direction: column; align-items: center; position: relative; }
        .hidden { display: none !important; }

        /* 頂部 UI */
        .stats-top { width: 100%; display: flex; justify-content: space-around; font-size: 1.5rem; font-weight: bold; background: #f8f9fa; padding: 15px; border-radius: 15px; }
        
        /* 戰鬥舞台區域 */
        .arena { display: flex; justify-content: center; align-items: flex-end; gap: 80px; width: 100%; height: 400px; margin-top: 20px; }
        .character-box { width: 400px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .sprite img { width: 350px; height: auto; image-rendering: pixelated; }
        #player-sprite img { transform: scaleX(-1); }

        /* 血條與狀態 */
        .hp-outer { width: 100%; height: 25px; background: #eee; border: 2px solid #ccc; border-radius: 15px; overflow: hidden; margin-top: 10px; }
        .hp-inner { height: 100%; background: #ff4757; width: 100%; transition: width 0.3s; }
        .buff-container { display: flex; gap: 5px; height: 30px; margin-top: 5px; }
        .buff { padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; color: white; background: #3498db; font-weight: bold; }

        /* 升級三選一 彈窗 */
        #level-up-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .options-container { display: flex; gap: 20px; margin-top: 30px; }
        .option-card {
            width: 250px; padding: 20px; border: 3px solid #333; border-radius: 15px;
            background: #fff; cursor: pointer; transition: 0.2s; text-align: center;
        }
        .option-card:hover { transform: scale(1.05); background: #f1f2f6; border-color: #3498db; }
        .option-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; color: #2f3542; }

        /* 戰鬥控制 */
        #log { width: 800px; height: 100px; background: #f1f2f6; border: 1px solid #ddd; padding: 15px; margin-top: 20px; overflow-y: auto; text-align: left; }
        .btns { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 20px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 8px; border: none; background: #2f3542; color: #fff; }
        button:disabled { opacity: 0.3; }

        /* 動畫 */
        .dmg { position: absolute; top: 0; font-size: 3rem; font-weight: bold; animation: f 0.8s forwards; z-index: 50; }
        @keyframes f { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 升級三選一介面 -->
    <div id="level-up-modal" class="hidden">
        <h1 style="font-size: 3rem; color: #f1c40f;">✨ 等級提升！選擇你的獎勵 ✨</h1>
        <div class="options-container" id="level-options"></div>
    </div>

    <!-- 戰鬥主介面 -->
    <div id="main-ui">
        <div class="stats-top">
            <div>LV: <span id="lv">1</span></div>
            <div id="story-line">💬 遭遇史萊姆...</div>
            <div>EXP: <span id="exp">0</span>/100</div>
        </div>

        <div class="arena">
            <div class="character-box">
                <div id="p-msg"></div>
                <div class="sprite" id="player-sprite"><img src="pixel_adventurer.png"></div>
                <div class="buff-container" id="p-buffs"></div>
                <div style="font-size: 1.5rem; font-weight: bold; margin-top:10px;">勇者 (<span id="hp">100</span>/<span id="mhp">100</span>)</div>
                <div class="hp-outer"><div id="hp-bar" class="hp-inner"></div></div>
            </div>
            <div class="character-box">
                <div id="e-msg"></div>
                <div class="sprite" id="enemy-sprite"><img src="pixel_slime.png" id="e-img"></div>
                <div style="font-size: 1.5rem; font-weight: bold; margin-top:10px;"><span id="e-name">史萊姆</span> (HP: <span id="e-hp">40</span>)</div>
                <div class="hp-outer"><div id="e-hp-bar" class="hp-inner"></div></div>
            </div>
        </div>

        <div id="log">> 準備戰鬥！</div>
        <div class="btns" id="btn-group">
            <button onclick="battle('atk')">🗡️ 普通攻擊</button>
        </div>
    </div>
</div>

<script>
    // 遊戲狀態與技能庫
    let p = { lv: 1, hp: 100, mhp: 100, atk: 20, exp: 0, busy: false, buffs: { shield: 0, power: 0 }, skills: [] };
    let e = { name: "史萊姆", hp: 50, mhp: 50, atk: 12 };
    let winCount = 0;

    const allSkills = [
        { id: 'fireball', name: '🔥 火球術', desc: '造成 2.5 倍魔法傷害', type: 'active' },
        { id: 'heal', name: '💊 治療術', desc: '回復 30% 生命值', type: 'active' },
        { id: 'shield', name: '🛡️ 聖盾', desc: '獲得 3 回合 50% 減傷', type: 'active' },
        { id: 'double', name: '⚔️ 連斬', desc: '隨機發動 2~3 次攻擊', type: 'active' },
        { id: 'lifesteal', name: '🧛 吸血', desc: '攻擊時回復 10% 傷害的體力', type: 'passive' },
        { id: 'crit', name: '🎯 鷹眼', desc: '暴擊率提升 20%', type: 'passive' },
        { id: 'poison', name: '🧪 毒刃', desc: '攻擊時附帶額外傷害', type: 'passive' },
        { id: 'atk_up', name: '💪 力量強化', desc: '基礎攻擊力永久 +15', type: 'buff' },
        { id: 'hp_up', name: '❤️ 生命強化', desc: '最大生命永久 +50', type: 'buff' },
        { id: 'dodge', name: '💨 殘像', desc: '閃避率永久提升 15%', type: 'passive' }
    ];

    async function battle(type) {
        if (p.busy) return; p.busy = true;
        setBtns(false);

        // --- 玩家回合 ---
        if (type === 'atk' || type === 'fireball' || type === 'double') {
            let mult = (type === 'fireball') ? 2.5 : 1;
            let hits = (type === 'double') ? (Math.random() > 0.5 ? 3 : 2) : 1;
            
            for(let i=0; i<hits; i++){
                let dmg = Math.floor((p.atk + (p.buffs.power*10)) * mult + Math.random()*10);
                if(p.skills.includes('crit') && Math.random() < 0.2) { dmg *= 2; pop('e-msg', 'CRIT!', '#f1c40f'); }
                e.hp -= dmg;
                pop('e-msg', `-${dmg}`, '#ff4757');
                move('player-sprite', 40);
                if(p.skills.includes('lifesteal')) { p.hp = Math.min(p.mhp, p.hp + Math.floor(dmg*0.1)); }
                update();
                await sleep(300);
            }
        } else if (type === 'heal') {
            let heal = Math.floor(p.mhp * 0.3);
            p.hp = Math.min(p.mhp, p.hp + heal);
            pop('p-msg', `+${heal}`, '#2ed573');
            log(`💊 你使用了治療術，回復了 ${heal} 點生命。`);
        } else if (type === 'shield') {
            p.buffs.shield = 3;
            log(`🛡️ 你張開了聖盾，防禦提升！`);
        }

        await sleep(600);
        if (e.hp <= 0) { await handleWin(); } 
        else {
            // --- 敵人回合 ---
            if(p.skills.includes('dodge') && Math.random() < 0.15) {
                log("💨 你閃避了攻擊！"); pop('p-msg', 'MISS', '#7f8c8d');
            } else {
                let edmg = Math.floor(e.atk + Math.random()*5);
                if(p.buffs.shield > 0) { edmg = Math.floor(edmg*0.5); p.buffs.shield--; }
                p.hp -= edmg;
                pop('p-msg', `-${edmg}`, '#ff4757');
                move('enemy-sprite', -40);
            }
            update();
            if (p.hp <= 0) { alert("你倒下了..."); location.reload(); }
        }
        p.busy = false; setBtns(true);
    }

    async function handleWin() {
        log(`🎉 擊敗了 ${e.name}！`);
        p.exp += 50;
        if(p.exp >= 100) { await showLevelUp(); }
        winCount++;
        await sleep(800);
        spawn();
    }

    function showLevelUp() {
        return new Promise(resolve => {
            p.exp = 0; p.lv++;
            const modal = document.getElementById('level-up-modal');
            const container = document.getElementById('level-options');
            modal.classList.remove('hidden');
            container.innerHTML = '';

            // 隨機選三種不重複的獎勵
            let shuffled = [...allSkills].sort(() => 0.5 - Math.random()).slice(0, 3);
            
            shuffled.forEach(skill => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.innerHTML = `<div class="option-title">${skill.name}</div><div>${skill.desc}</div>`;
                card.onclick = () => {
                    applyReward(skill);
                    modal.classList.add('hidden');
                    resolve();
                };
                container.appendChild(card);
            });
        });
    }

    function applyReward(skill) {
        if(skill.type === 'active') {
            if(!p.skills.includes(skill.id)) {
                p.skills.push(skill.id);
                const btn = document.createElement('button');
                btn.innerText = skill.name;
                btn.onclick = () => battle(skill.id);
                document.getElementById('btn-group').appendChild(btn);
            }
            log(`✨ 學會了新技能：${skill.name}！`);
        } else if(skill.id === 'atk_up') { p.atk += 15; }
        else if(skill.id === 'hp_up') { p.mhp += 50; p.hp += 50; }
        else { p.skills.push(skill.id); }
        update();
    }

    function spawn() {
        e = { name: "史萊姆", hp: 40+(p.lv*20), mhp: 40+(p.lv*20), atk: 10+(p.lv*3) };
        if(winCount % 5 === 0) { e.name = "🔥 BOSS 史萊姆"; e.hp *= 3; e.atk *= 1.5; document.getElementById('e-img').style.filter="hue-rotate(90deg)"; }
        else { document.getElementById('e-img').style.filter="none"; }
        update();
    }

    function update() {
        document.getElementById('lv').innerText = p.lv;
        document.getElementById('hp').innerText = Math.max(0, p.hp);
        document.getElementById('mhp').innerText = p.mhp;
        document.getElementById('hp-bar').style.width = (p.hp/p.mhp*100) + "%";
        document.getElementById('e-hp').innerText = Math.max(0, e.hp);
        document.getElementById('e-hp-bar').style.width = (e.hp/e.mhp*100) + "%";
        document.getElementById('e-name').innerText = e.name;
        document.getElementById('p-buffs').innerHTML = p.buffs.shield > 0 ? `<div class="buff">🛡️ 護盾 ${p.buffs.shield}</div>` : '';
    }

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function setBtns(s) { document.querySelectorAll('button').forEach(b => b.disabled = !s); }
    function pop(id, t, c) {
        const el = document.getElementById(id); const d = document.createElement('div');
        d.className = 'dmg'; d.innerText = t; d.style.color = c;
        el.appendChild(d); setTimeout(() => d.remove(), 800);
    }
    function move(id, x) {
        const el = document.getElementById(id); el.style.transform = `translateX(${x}px)`;
        setTimeout(() => el.style.transform = 'none', 200);
    }
    update();
</script>
</body>
</html>
