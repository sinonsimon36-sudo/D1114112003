<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Pixel RPG - жҠҖиғҪиҲҮиЈқеӮҷеӨ§ж“ҙејөзүҲ</title>
    <style>
        :root { --gold: #f1c40f; --danger: #ff4757; --primary: #2f3542; --success: #2ecc71; --rarity: #9b59b6; --info: #3498db; }

        body { 
            background-image: url('pure_pixel_forest_background.png');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            background-attachment: fixed; image-rendering: pixelated; 
            color: var(--primary); font-family: 'Segoe UI', "еҫ®и»ҹжӯЈй»‘й«”", sans-serif; 
            margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; 
        }

        #game-container { 
            width: 92vw; max-width: 1400px; height: 92vh; 
            background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(8px);
            border: 4px solid var(--primary); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; 
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); padding: 15px; box-sizing: border-box;
        }

        .hidden { display: none !important; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.96); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-radius: 18px; }
        .card-wrap { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; justify-content: center; max-width: 1000px; }
        .card { width: 200px; padding: 15px; border: 3px solid var(--primary); border-radius: 15px; cursor: pointer; background: #fff; transition: 0.3s; }
        .card:hover { transform: translateY(-8px); border-color: var(--info); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .stats-bar { width: 100%; display: flex; justify-content: space-around; background: rgba(0,0,0,0.05); padding: 10px; font-size: 1.1rem; font-weight: bold; border-radius: 10px; }
        .arena { flex: 1; display: flex; justify-content: center; align-items: flex-end; gap: 40px; width: 100%; position: relative; }
        .char-box { width: 320px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .sprite { width: 100%; height: 320px; display: flex; align-items: flex-end; justify-content: center; pointer-events: none; transition: transform 0.1s; }
        .sprite img { max-width: 100%; max-height: 100%; image-rendering: pixelated; object-fit: contain; }
        #p-sprite img { transform: scaleX(-1); }

        .hp-outer { width: 100%; height: 18px; background: #ddd; border-radius: 10px; overflow: hidden; margin-top: 5px; border: 2px solid #555; }
        .hp-inner { height: 100%; background: var(--danger); width: 100%; transition: width 0.3s; }
        
        /* иЈқеӮҷж је„ӘеҢ– */
        .equip-grid { display: flex; gap: 6px; margin-top: 8px; }
        .slot { width: 45px; height: 45px; border: 2px solid #aaa; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border-radius: 8px; color: #333; }

        /* йҒ“е…·ж¬„е„ӘеҢ– */
        .item-bar { display: flex; gap: 12px; margin: 10px 0; height: 60px; justify-content: center; }
        .item-slot { width: 55px; height: 55px; border: 3px solid #666; background: #fff; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; font-size: 1.6rem; }
        .item-slot .count { position: absolute; bottom: -5px; right: -5px; background: #e74c3c; color: #fff; font-size: 0.75rem; padding: 2px 7px; border-radius: 10px; font-weight: bold; }

        #log { width: 85%; height: 75px; background: rgba(0,0,0,0.03); padding: 10px; overflow-y: auto; text-align: left; border-radius: 8px; font-size: 0.95rem; border: 1px solid #ccc; }
        .btns { margin: 10px 0; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; z-index: 1000; }
        button { padding: 10px 25px; font-size: 1rem; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; background: var(--primary); color: #fff; box-shadow: 0 4px 0 #000; }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
        button:disabled { opacity: 0.4; }

        /* еӮ·е®ійЈ„еӯ—еӢ•з•« */
        .dmg { position: absolute; top: -20px; font-weight: 900; pointer-events: none; z-index: 100; animation: floatUp 0.8s ease-out forwards; }
        @keyframes floatUp { 
            0% { opacity: 1; transform: translateY(0) scale(1); } 
            50% { transform: translateY(-60px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-120px) scale(1); } 
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="lobby" class="overlay">
        <img src="pixel_art_rpg_logo.png" style="width:380px; margin-bottom:15px;">
        <h1 style="margin:0;">еӢҮиҖ…еӮіиӘӘпјҡз„ЎйҷҗзҘһиЈқ</h1>
        <p>ж”¶йӣҶзЁҖжңүиЈқеӮҷпјҢжҢ‘жҲ°еҸІиҗҠе§Ҷйӯ”зҺӢпјҒ</p>
        <button onclick="startGame()">й–Ӣе§Ӣж—…зЁӢ</button>
    </div>

    <div id="lv-modal" class="overlay hidden">
        <h1 style="color:var(--gold);">вңЁ зӘҒз ҙжҘөйҷҗпјҡйҒёж“ҮеӨ©иіҰ вңЁ</h1>
        <div id="lv-options" class="card-wrap"></div>
    </div>

    <div id="shop-modal" class="overlay hidden">
        <h1>рҹӣ’ еҶ’йҡӘиҖ…зҷҫиІЁ</h1>
        <p>жҢҒжңүйҮ‘е№Јпјҡ<span id="shop-gold" style="color:var(--gold)">0</span> G</p>
        <div id="shop-items" class="card-wrap"></div>
        <button style="margin-top:15px; background:#777" onclick="toggleShop(false)">иҝ”еӣһжЈ®жһ—</button>
    </div>

    <div id="battle-ui" class="hidden" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center;">
        <div class="stats-bar">
            <div>рҹӣЎпёҸ LV: <span id="lv">1</span></div>
            <div id="story-text">рҹ’¬ жӯЈеңЁз©ҝйҒҺжЈ®жһ—...</div>
            <div style="color:var(--gold)">рҹ’° <span id="gold">0</span> G</div>
            <div>вӯҗ BOSS йҖІеәҰ: <span id="kill-count">0</span>/5</div>
        </div>

        <div class="arena">
            <div class="char-box">
                <div id="p-msg"></div>
                <div class="sprite" id="p-sprite"><img src="pixel_adventurer.png"></div>
                <div class="equip-grid">
                    <div class="slot" id="slot-1" title="жӯҰеҷЁ"></div>
                    <div class="slot" id="slot-2" title="йҳІе…·"></div>
                    <div class="slot" id="slot-3" title="йЈҫе“Ғ"></div>
                    <div class="slot" id="slot-4" title="йқҙеӯҗ"></div>
                </div>
                <div style="font-weight:bold; margin-top:5px;">еӢҮиҖ… (HP: <span id="hp">100</span>/<span id="mhp">100</span>)</div>
                <div class="hp-outer"><div id="hp-bar" class="hp-inner"></div></div>
            </div>
            <div class="char-box" id="e1-box">
                <div id="e1-msg"></div>
                <div class="sprite" id="e1-sprite"><img src="pixel_slime.png" id="e1-img"></div>
                <div id="e1-tag" style="background:#2ed573; padding:2px 10px; border-radius:10px; color:#fff; font-size:0.75rem; font-weight:bold; margin-bottom:5px;">жҷ®йҖҡ</div>
                <div style="font-weight:bold;"><span id="e1-name">еҸІиҗҠе§Ҷ</span></div>
                <div class="hp-outer"><div id="e1-hp-bar" class="hp-inner"></div></div>
            </div>
        </div>

        <div class="item-bar" id="p-items"></div>
        <div id="log">> жҲ°й¬Ҙжә–еӮҷй–Ӣе§Ӣ...</div>
        <div class="btns" id="btn-group">
            <button id="atk-btn" onclick="handleBattle('atk')">рҹ—ЎпёҸ жҷ®йҖҡж”»ж“Ҡ</button>
            <button style="background:#e67e22" onclick="toggleShop(true)">рҹӣ’ е•ҶеҹҺ</button>
        </div>
    </div>
</div>

<script>
    // --- ж“ҙејөеҫҢзҡ„ж•ёж“ҡеә« ---
    let g = {
        p: { lv:1, hp:100, mhp:100, atk:25, gold:100, exp:0, busy:false, skills:[], equips:[], inv:{pot:1}, crit:0.1, life:0, dodge:0, goldMult:1, double:0 },
        enemies: [], killCount: 0
    };

    const talentPool = [
        { id:'fire', n:'рҹ”Ҙ зҒ«зҗғиЎ“', d:'2.5 еҖҚзҫӨй«”жі•еӮ·' },
        { id:'thunder', n:'вҡЎ йӣ·ж“ҠиЎ“', d:'й«ҳж©ҹзҺҮе°Қе–®й«”жҡҙж“Ҡ' },
        { id:'double', n:'вҡ”пёҸ дәҢйҖЈж–¬', d:'25% ж©ҹзҺҮж”»ж“Ҡе…©ж¬Ў' },
        { id:'poison', n:'вҳ пёҸ жҜ’йң§', d:'жҜҸеӣһеҗҲеӣәе®ҡйЎҚеӨ–еӮ·е®і' },
        { id:'shield', n:'рҹӣЎпёҸ е®Ҳиӯ·', d:'зҚІеҫ—ж°ёд№… 15% жёӣеӮ·' },
        { id:'crit', n:'рҹҺҜ й·№зңј', d:'жҡҙж“ҠзҺҮжҸҗеҚҮ 25%' },
        { id:'life', n:'рҹ§ӣ е—ңиЎҖ', d:'ж”»ж“Ҡйҷ„её¶ 20% еҗёиЎҖ' },
        { id:'hp', n:'вқӨпёҸ з”ҹе‘Ҫеј·еҢ–', d:'жңҖеӨ§ HP +80' }
    ];

    const shopList = [
        { id:'sword', n:'вҡ”пёҸ еұ йҫҚеҜ¶еҲҖ', p:180, d:'ATK +30', s:1, i:'вҡ”пёҸ' },
        { id:'armor', n:'рҹӣЎпёҸ дёҚж»…йҮҚз”І', p:250, d:'HP +150', s:2, i:'рҹӣЎпёҸ' },
        { id:'amulet', n:'рҹ“ҝ й»ғйҮ‘иӯ·иә«з¬Ұ', p:150, d:'йҮ‘е№ЈзҚІеҸ– +50%', s:3, i:'рҹ“ҝ' },
        { id:'boots', n:'рҹҘҫ з–ҫиЎҢд№Ӣйқҙ', p:120, d:'й–ғйҒҝзҺҮ +15%', s:4, i:'рҹҘҫ' },
        { id:'pot', n:'рҹ§Ә еӣһеҫ©и—Ҙж°ҙ', p:30, d:'иЈң 50% HP', consume:true }
    ];

    function startGame() { document.getElementById('lobby').classList.add('hidden'); document.getElementById('battle-ui').classList.remove('hidden'); spawn(); updateUI(); }

    async function handleBattle(type) {
        if (g.p.busy) return; g.p.busy = true; setBtns(false);
        try {
            let t = g.enemies;
            let baseDmg = g.p.atk + (g.p.equips.includes('sword')?30:0);

            // 1. зҺ©е®¶еӣһеҗҲ (жӘўжҹҘйҖЈж“Ҡ)
            let hits = (g.p.skills.includes('double') && Math.random() < 0.25) ? 2 : 1;
            for(let i=0; i<hits; i++) {
                let dmg = Math.floor(baseDmg + r(10));
                let isCrit = Math.random() < g.p.crit || (type==='thunder' && Math.random()<0.4);
                if(type==='fire') dmg *= 2.5;
                if(isCrit) dmg *= 2;

                t.hp -= dmg;
                pop('e1-msg', (isCrit?'рҹ”ҘCRIT! ':'')+'-'+dmg, isCrit?'orange':'red', isCrit?'3rem':'2.2rem');
                move('p-sprite', 40); shake('e1-sprite');
                log(`рҹ—ЎпёҸ дҪ ж–Ҫеұ•ж”»ж“ҠпјҢйҖ жҲҗ ${dmg} й»һеӮ·е®ігҖӮ`);
                
                if(g.p.life > 0) {
                    let heal = Math.floor(dmg * 0.2);
                    g.p.hp = Math.min(g.p.mhp, g.p.hp + heal);
                    pop('p-msg', '+'+heal, 'green', '1.5rem');
                }
                updateUI(); await sleep(300);
            }

            if (t.hp <= 0) { await handleWin(); } 
            else {
                // 2. еҸІиҗҠе§ҶжҜ’еӮ· (еҰӮжһңжңүеӯёжҜ’йң§)
                if(g.p.skills.includes('poison')) {
                    t.hp -= 20; pop('e1-msg', '-20', 'purple', '1.8rem');
                    log(`вҳ пёҸ жҜ’йң§е°Қж•өдәәйҖ жҲҗжҢҒзәҢеӮ·е®іпјҒ`);
                    updateUI(); await sleep(300);
                }

                if(t.hp > 0) {
                    // 3. ж•өдәәеҸҚж“Ҡ (жӘўжҹҘй–ғйҒҝ)
                    if(Math.random() < g.p.dodge) {
                        pop('p-msg', 'MISS!', 'gray', '2rem');
                        log(`рҹ’Ё дҪ ж•ҸжҚ·ең°й–ғй–ӢдәҶе°Қж–№зҡ„ж”»ж“ҠпјҒ`);
                    } else {
                        let edmg = Math.floor(t.atk * (g.p.skills.includes('shield')?0.85:1));
                        g.p.hp -= edmg; pop('p-msg', '-'+edmg, 'red', '2rem'); shake('p-sprite');
                        log(`${t.name} зҷјеӢ•еҸҚж“ҠпјҢйҖ жҲҗ ${edmg} й»һеӮ·е®ігҖӮ`);
                    }
                    updateUI(); await sleep(400);
                }
                if (g.p.hp <= 0) { alert("еӢҮиҖ…ж•—еҢ—пјҒеҶ’йҡӘйҮҚй–ӢгҖӮ"); location.reload(); }
                if (t.hp <= 0) await handleWin();
            }
        } finally { g.p.busy = false; setBtns(true); }
    }

    function useItem(id) {
        if(g.p.busy || g.p.inv[id] <= 0) return;
        let heal = Math.floor(g.p.mhp * 0.5);
        g.p.hp = Math.min(g.p.mhp, g.p.hp + heal); g.p.inv[id]--; 
        log(`рҹ§Ә дҪҝз”Ёи—Ҙж°ҙпјҢй«”еҠӣеӣһеҫ© ${heal} й»һгҖӮ`); pop('p-msg', '+'+heal, 'green', '2rem');
        updateUI();
    }

    async function handleWin() {
        let isB = g.enemies.isBoss;
        let gold = Math.floor((g.enemies.gold + r(20)) * g.p.goldMult);
        g.p.gold += gold; g.p.exp += 50;
        log(`рҹҺү еӢқеҲ©пјҒзҚІеҫ—дәҶ ${gold} GгҖӮ`);
        if (g.p.exp >= 100) await showLevelUp();
        if(!isB) g.killCount++; else g.killCount = 0;
        await sleep(800); spawn();
    }

    function spawn() {
        g.enemies = [];
        if(g.killCount >= 5) {
            g.enemies.push({ id:1, name:"рҹ‘ҝ еҸІиҗҠе§ҶеӨ§йӯ”зҺӢ", hp:600+g.p.lv*100, mhp:600+g.p.lv*100, atk:35, gold:200, isBoss:true });
            document.getElementById('e1-img').style.filter = "hue-rotate(280deg) brightness(0.7) scale(1.4)";
            document.getElementById('e1-tag').innerText = "BOSS";
        } else {
            g.enemies.push({ id:1, name:"еҸІиҗҠе§Ҷ", hp:50+g.p.lv*15, mhp:50+g.p.lv*15, atk:12, gold:25, isBoss:false });
            document.getElementById('e1-img').style.filter = "none";
            document.getElementById('e1-tag').innerText = "жҷ®йҖҡ";
        }
        updateUI();
    }

    function toggleShop(s) {
        document.getElementById('shop-modal').classList.toggle('hidden', !s);
        document.getElementById('shop-gold').innerText = g.p.gold;
        const cont = document.getElementById('shop-items'); cont.innerHTML = '';
        shopList.forEach(i => {
            const c = document.createElement('div'); c.className = 'card';
            c.innerHTML = `<h3>${i.n}</h3><p>${i.d}</p><p style="color:var(--gold)">${i.p} G</p>`;
            c.onclick = () => {
                if(g.p.gold >= i.p) {
                    if(i.consume) { g.p.gold -= i.p; g.p.inv.pot++; log(`рҹӣ’ иіјиІ·и—Ҙж°ҙжҲҗеҠҹгҖӮ`); }
                    else {
                        if(!g.p.equips.includes(i.id)) {
                            g.p.gold -= i.p; g.p.equips.push(i.id); 
                            document.getElementById('slot-'+i.s).innerText = i.i;
                            if(i.id==='armor') g.p.mhp += 150;
                            if(i.id==='amulet') g.p.goldMult = 1.5;
                            if(i.id==='boots') g.p.dodge = 0.15;
                            log(`рҹӣ’ иЈқеӮҷдәҶ ${i.n}пјҒ`);
                        } else alert("е·Іж“ҒжңүжӯӨиЈқеӮҷпјҒ");
                    }
                    toggleShop(true); updateUI();
                } else alert("йҢўдёҚеӨ пјҒ");
            };
            cont.appendChild(c);
        });
    }

    function showLevelUp() {
        return new Promise(res => {
            g.p.exp = 0; g.p.lv++;
            const modal = document.getElementById('lv-modal'); modal.classList.remove('hidden');
            const cont = document.getElementById('lv-options'); cont.innerHTML = '';
            talentPool.sort(()=>0.5-Math.random()).slice(0,3).forEach(s => {
                const c = document.createElement('div'); c.className = 'card';
                c.innerHTML = `<h3>${s.n}</h3><p>${s.d}</p>`;
                c.onclick = () => {
                    if(s.id==='hp') { g.p.mhp+=80; g.p.hp=g.p.mhp; }
                    else if(s.id==='crit') g.p.crit += 0.25;
                    else if(s.id==='life') g.p.life = 1;
                    else if(!g.p.skills.includes(s.id)) {
                        g.p.skills.push(s.id);
                        const b = document.createElement('button'); b.innerText = s.n; 
                        b.onclick = () => handleBattle(s.id); document.getElementById('btn-group').appendChild(b);
                    }
                    modal.classList.add('hidden'); res(); updateUI();
                };
                cont.appendChild(c);
            });
        });
    }

    function updateUI() {
        document.getElementById('lv').innerText = g.p.lv;
        document.getElementById('hp').innerText = Math.floor(g.p.hp); 
        document.getElementById('mhp').innerText = g.p.mhp;
        document.getElementById('hp-bar').style.width = (g.p.hp/g.p.mhp*100) + "%";
        document.getElementById('gold').innerText = g.p.gold;
        document.getElementById('kill-count').innerText = g.killCount % 5;
        let e = g.enemies;
        document.getElementById('e1-hp-bar').style.width = (e.hp/e.mhp*100) + "%";
        document.getElementById('e1-name').innerText = e.name;
        
        const iBox = document.getElementById('p-items'); iBox.innerHTML = '';
        const count = g.p.inv.pot;
        const slot = document.createElement('div'); slot.className = `item-slot ${count===0?'empty':''}`;
        slot.innerHTML = `<span>рҹ§Ә</span>${count>0?`<div class="count">x${count}</div>`:''}`;
        if(count>0) slot.onclick = () => useItem('pot');
        iBox.appendChild(slot);
    }

    function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }
    function r(n) { return Math.floor(Math.random()*n); }
    function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }
    function setBtns(s) { document.querySelectorAll('button').forEach(b => { if(!b.parentElement.classList.contains('card')) b.disabled = !s; }); }
    function move(id, x) { const e = document.getElementById(id); e.style.transform = `translateX(${x}px)`; setTimeout(()=>e.style.transform='none', 200); }
    function shake(id) { const e = document.getElementById(id); e.style.transform = `translateX(6px)`; setTimeout(()=>e.style.transform=`translateX(-6px)`, 50); setTimeout(()=>e.style.transform='none', 100); }
    function pop(id, t, c, fs) {
        const cl = document.getElementById(id); const d = document.createElement('div');
        d.className = 'dmg'; d.innerText = t; d.style.color = c; if(fs) d.style.fontSize = fs;
        cl.appendChild(d); setTimeout(()=>d.remove(), 800);
    }
</script>
</body>
</html>
